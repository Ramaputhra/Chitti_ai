capability_metadata:
  capability_id: sys.file.delete
  version: 1.0.0
  author: core
  platforms: [windows]
  supports_learning: true
  supports_cloud: true

compatibility:
  minimum_runtime: 1.0
  deprecated: false
  replaces: null

intent:
  - delete permanently
  - delete forever
  - destroy

parameters:
  targets: required

failure_policy:
  recoverable:
    - path_resolution_failed
    - TARGET_LOCKED
  non_recoverable:
    - access_denied
    - SOURCE_NOT_FOUND
    - MISSING_REQUIRED_PARAMETER
  retry:
    max_attempts: 1

security_safety:
  safety_level: dangerous
  rules:
    - default:
      safety_level: dangerous
      confirmation_required: true
  undo_supported: false

performance_expectations:
  execution_profile: normal
  target_ms: 2000
  long_running: false

execution:
  idempotent: false

execution_cost:
  cpu: low
  memory: low
  disk: medium
  network: none

aca:
  parameterizable: true
