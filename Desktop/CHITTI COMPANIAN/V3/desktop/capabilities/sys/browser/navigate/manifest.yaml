capability_metadata:
  capability_id: sys.browser.navigate
  version: 1.0.0
  author: core
  platforms: [windows, macos, linux]
  supports_learning: true
  supports_cloud: true

compatibility:
  minimum_runtime: 1.0
  deprecated: false
  replaces: null

intent:
  - navigate
  - go to
  - open url
  - visit

parameters:
  context: required
  url: required

failure_policy:
  recoverable:
    - TIMEOUT
    - DNS_RESOLUTION_FAILED
  non_recoverable:
    - MISSING_REQUIRED_PARAMETER
    - INVALID_URL
  retry:
    max_attempts: 2

security_safety:
  safety_level: normal
  rules:
    - default:
      safety_level: normal
      confirmation_required: false
  undo_supported: false

performance_expectations:
  execution_profile: normal
  target_ms: 3000
  long_running: true

execution:
  idempotent: true

execution_cost:
  cpu: medium
  memory: high
  disk: low
  network: high

aca:
  parameterizable: true
