capability_metadata:
  capability_id: sys.browser.launch
  version: 1.0.0
  author: core
  platforms: [windows, macos, linux]
  supports_learning: true
  supports_cloud: true

compatibility:
  minimum_runtime: 1.0
  deprecated: false
  replaces: null

intent:
  - launch browser
  - open browser
  - start browser

parameters:
  browser_type:
    type: string
    default: "chrome"
  headless:
    type: boolean
    default: true
  profile:
    type: string
    default: null

failure_policy:
  recoverable:
    - TIMEOUT
  non_recoverable:
    - BROWSER_NOT_INSTALLED
  retry:
    max_attempts: 1

security_safety:
  safety_level: normal
  rules:
    - default:
      safety_level: normal
      confirmation_required: false
  undo_supported: false

performance_expectations:
  execution_profile: long_running
  target_ms: 5000
  long_running: true

execution:
  idempotent: false

execution_cost:
  cpu: high
  memory: high
  disk: medium
  network: none

aca:
  parameterizable: true
